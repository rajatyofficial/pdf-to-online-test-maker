<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local MCQ Test Maker</title>
    <link rel="stylesheet" href="/vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">MCQ</div>
          <div>
            <h1>Test Maker</h1>
            <p id="llmStatus">Checking local model...</p>
          </div>
        </div>
        <nav class="nav-list" aria-label="Primary">
          <button class="nav-button" data-route="home">Home</button>
          <button class="nav-button" data-route="import">Create New Test</button>
          <button class="nav-button" data-route="tests">Existing Tests</button>
          <button class="nav-button" data-route="history">Test History</button>
          <button class="nav-button" data-route="settings">Settings</button>
        </nav>
      </aside>
      <main class="main-panel">
        <div id="app" class="view"></div>
      </main>
    </div>
    <script src="/vendor/katex/katex.min.js"></script>
    <script src="/vendor/katex/contrib/auto-render.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
